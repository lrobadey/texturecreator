<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Texture Timeline</title>
<style>
  :root{
    --bg:#f6f4ef;
    --panel:#ffffff;
    --panel-2:#fbfaf7;
    --panel-3:#eeebe4;
    --ink:#23211e;
    --soft:#4d4942;
    --muted:#7b756b;
    --line:#e0d9cf;
    --line-strong:#bfb5a8;
    --accent:#171615;
    --accent-ink:#ffffff;
    --red:#9d3630;
    --red-soft:#f7e8e5;
    --gold:#90680f;
    --editor-w:430px;
    --beat-px:44px;
    --measure-px:176px;
    --timeline-w:760px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    height:100vh;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:var(--bg);
    color:var(--ink);
    font:13px/1.45 ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  }
  button,input,select{font:inherit}
  button{
    min-height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel-2);
    color:var(--ink);
    padding:6px 10px;
    cursor:pointer;
  }
  button:hover{background:var(--panel-3);border-color:var(--line-strong)}
  button:active{transform:scale(.98)}
  button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--accent-ink);
    font-weight:700;
  }
  button.icon{
    width:32px;
    padding:0;
    display:inline-grid;
    place-items:center;
    font-weight:750;
  }
  button.danger{
    color:var(--red);
    border-color:#ebd2ce;
    background:#fffafa;
  }
  button:disabled,
  input:disabled{
    opacity:.48;
    cursor:not-allowed;
  }
  label{
    display:flex;
    flex-direction:column;
    gap:5px;
    color:var(--muted);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  input,select{
    width:100%;
    min-height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel);
    color:var(--ink);
    padding:6px 8px;
  }
  input[type=color]{
    padding:3px;
    min-height:32px;
  }
  input[type=range]{
    accent-color:var(--accent);
  }
  select{appearance:auto}
  .topbar{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    align-items:center;
    gap:18px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.93);
    backdrop-filter:blur(10px);
  }
  .brand{min-width:198px}
  .brand h1{
    margin:0;
    font-size:15px;
    line-height:1.1;
    font-weight:780;
    letter-spacing:0;
  }
  .brand p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:12px;
  }
  .toolbar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-left:auto;
  }
  .composer-control{
    display:flex;
    flex-direction:column;
    gap:5px;
  }
  .control-title{
    color:var(--muted);
    font-size:10px;
    font-weight:700;
    line-height:1;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  .sig{
    display:flex;
    align-items:center;
    gap:7px;
    padding:3px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
  }
  .stepper{
    display:grid;
    grid-template-columns:28px minmax(34px,auto) 28px;
    align-items:center;
    min-height:32px;
    border:1px solid transparent;
    border-radius:999px;
    background:var(--panel-2);
  }
  .stepper:focus-within{
    border-color:var(--line-strong);
    background:var(--panel);
  }
  .stepper button,
  .unit-option{
    min-height:28px;
    border:0;
    background:transparent;
  }
  .stepper button{
    width:28px;
    padding:0;
    border-radius:999px;
    color:var(--muted);
    font-size:15px;
    font-weight:760;
  }
  .stepper button:hover,
  .unit-option:hover{
    background:var(--panel-3);
    border-color:transparent;
  }
  .stepper-value{
    min-width:32px;
    text-align:center;
    font-size:14px;
    font-weight:780;
    font-variant-numeric:tabular-nums;
  }
  .signature-mark{
    color:var(--muted);
    font-size:15px;
    font-weight:780;
    line-height:1;
  }
  .unit-options{
    display:flex;
    gap:2px;
    padding:2px;
    border-radius:999px;
    background:var(--panel-3);
  }
  .unit-option{
    min-width:29px;
    padding:0 7px;
    border-radius:999px;
    color:var(--muted);
    font-size:12px;
    font-weight:720;
  }
  .unit-option.active{
    background:var(--accent);
    color:var(--accent-ink);
  }
  .bar-control .stepper{
    grid-template-columns:30px 50px 30px;
  }
  .metric{
    min-width:170px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel);
  }
  .metric span{
    display:block;
    color:var(--muted);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  .metric b{
    display:block;
    margin-top:1px;
    font-size:14px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .tempo-unit{width:76px}
  .tempo-bpm{width:88px}
  .transport-button{
    min-width:72px;
  }
  .board{
    flex:1 1 0;
    min-height:0;
    overflow:auto;
    background:var(--bg);
  }
  .timeline-content{
    min-width:calc(var(--editor-w) + var(--timeline-w));
  }
  .ruler-row,
  .voice-row{
    display:grid;
    grid-template-columns:var(--editor-w) var(--timeline-w);
    width:calc(var(--editor-w) + var(--timeline-w));
  }
  .ruler-row{
    position:sticky;
    top:0;
    z-index:12;
    min-height:46px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);
  }
  .corner,
  .voice-editor{
    position:sticky;
    left:0;
    z-index:10;
    background:var(--panel);
    border-right:1px solid var(--line);
  }
  .corner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 14px;
    color:var(--muted);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  .ruler{
    position:relative;
    min-height:46px;
    background:
      repeating-linear-gradient(to right,rgba(35,33,30,.18) 0 1px,transparent 1px var(--measure-px)),
      repeating-linear-gradient(to right,rgba(35,33,30,.06) 0 1px,transparent 1px var(--beat-px));
  }
  .measure-label{
    position:absolute;
    top:7px;
    transform:translateX(6px);
    color:var(--soft);
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }
  .beat-label{
    position:absolute;
    bottom:6px;
    transform:translateX(6px);
    color:var(--muted);
    font-size:10px;
    font-variant-numeric:tabular-nums;
  }
  .voice-row{
    min-height:238px;
    border-bottom:1px solid var(--line);
  }
  .voice-row.collapsed{
    min-height:88px;
  }
  .voice-editor{
    padding:14px;
  }
  .voice-row.collapsed .voice-editor{
    display:flex;
    align-items:center;
    padding:10px 14px;
  }
  .voice-head{
    display:grid;
    grid-template-columns:32px minmax(0,1fr) 32px 32px;
    gap:8px;
    align-items:end;
    margin-bottom:12px;
  }
  .voice-collapsed{
    display:grid;
    grid-template-columns:32px minmax(0,1fr) 32px;
    gap:10px;
    align-items:center;
    width:100%;
  }
  .voice-summary{min-width:0}
  .voice-summary strong{
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:13px;
  }
  .voice-summary span{
    display:block;
    margin-top:2px;
    color:var(--muted);
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }
  .compact-cycles{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    margin-top:7px;
    overflow:hidden;
  }
  .cycle-chip{
    flex:none;
    border:1px solid var(--line);
    border-left-width:5px;
    border-radius:6px;
    background:var(--panel-2);
    color:var(--soft);
    padding:3px 6px;
    font-size:11px;
    line-height:1.2;
    white-space:nowrap;
  }
  .cycle-tabs{
    display:flex;
    gap:6px;
    margin-bottom:12px;
    overflow-x:auto;
    padding-bottom:2px;
  }
  .cycle-tab{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:7px;
    max-width:142px;
    min-height:30px;
    padding:5px 8px;
    border-color:var(--line);
    background:var(--panel-2);
  }
  .cycle-tab.selected{
    background:#191816;
    border-color:#191816;
    color:#fff;
  }
  .swatch{
    width:9px;
    height:9px;
    border-radius:50%;
    flex:none;
    box-shadow:0 0 0 1px rgba(0,0,0,.12);
  }
  .cycle-tab span:last-child{
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .cycle-panel{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .cycle-grid{
    display:grid;
    grid-template-columns:minmax(0,1.4fr) 72px 88px 96px 54px;
    gap:7px;
    align-items:end;
  }
  .cycle-stats{
    display:grid;
    grid-template-columns:repeat(4,minmax(0,1fr));
    gap:7px;
  }
  .stat{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel-2);
    padding:7px 8px;
    min-width:0;
  }
  .stat span{
    display:block;
    color:var(--muted);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
    white-space:nowrap;
  }
  .stat b{
    display:block;
    margin-top:2px;
    font-size:12px;
    font-variant-numeric:tabular-nums;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .block-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .block-editor{
    display:grid;
    grid-template-columns:72px 88px minmax(0,1fr) 32px;
    gap:7px;
    align-items:end;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    padding:8px;
  }
  .block-editor select,
  .block-editor input{background:var(--panel-2)}
  .pitch-input[disabled]{
    color:#aaa39a;
    background:#f4f1eb;
  }
  .row-actions{
    display:flex;
    justify-content:flex-end;
    gap:8px;
  }
  .lane-cell{
    position:relative;
    min-height:238px;
    background:
      repeating-linear-gradient(to right,rgba(35,33,30,.15) 0 1px,transparent 1px var(--measure-px)),
      repeating-linear-gradient(to right,rgba(35,33,30,.05) 0 1px,transparent 1px var(--beat-px)),
      #fbfaf7;
    overflow:hidden;
  }
  .voice-row.collapsed .lane-cell{
    min-height:88px;
  }
  .cycle-region{
    position:absolute;
    top:0;
    height:38px;
    border-right:1px solid rgba(35,33,30,.18);
    border-bottom:1px solid rgba(35,33,30,.12);
    background:var(--cycle-bg);
    cursor:pointer;
    z-index:3;
    overflow:hidden;
  }
  .cycle-region.selected{
    box-shadow:inset 0 -3px 0 var(--cycle-color), inset 0 0 0 1px rgba(35,33,30,.16);
  }
  .cycle-region-label{
    position:absolute;
    inset:6px 8px auto 8px;
    display:flex;
    align-items:center;
    gap:7px;
    color:rgba(35,33,30,.82);
    font-size:11px;
    font-weight:680;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .cycle-region-label small{
    color:rgba(35,33,30,.56);
    font-size:10px;
    font-weight:600;
  }
  .transition-band{
    position:absolute;
    top:0;
    bottom:0;
    right:0;
    background:var(--transition-bg);
    border-left:1px dashed rgba(35,33,30,.22);
    pointer-events:none;
  }
  .voice-row.collapsed .cycle-region{
    height:26px;
  }
  .voice-row.collapsed .cycle-region-label{
    display:none;
  }
  .lane-axis{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
  }
  .repeat-line{
    position:absolute;
    top:38px;
    bottom:0;
    border-left:1px dashed rgba(144,104,15,.34);
  }
  .repeat-line.cycle-boundary{
    border-left:1px solid rgba(35,33,30,.24);
  }
  .playhead{
    position:absolute;
    top:0;
    bottom:0;
    width:2px;
    background:#161514;
    box-shadow:0 0 0 1px rgba(255,255,255,.65), 0 0 12px rgba(35,33,30,.18);
    z-index:8;
    pointer-events:none;
  }
  .voice-row.collapsed .repeat-line{
    top:26px;
  }
  .event{
    position:absolute;
    min-width:14px;
    border:1px solid var(--event-border);
    border-radius:6px;
    background:var(--event-bg);
    color:#1f1d1a;
    overflow:hidden;
    z-index:4;
    box-shadow:0 1px 0 rgba(255,255,255,.45) inset;
  }
  .event.added{
    border-style:dashed;
    opacity:.9;
  }
  .event-inner{
    display:flex;
    height:100%;
    flex-direction:column;
    justify-content:center;
    gap:2px;
    padding:0 7px;
    white-space:nowrap;
  }
  .event strong{
    display:block;
    font-size:12px;
    line-height:1;
  }
  .event span{
    display:block;
    color:rgba(35,33,30,.62);
    font-size:10px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .voice-row.collapsed .event-inner{
    padding:0 5px;
    gap:0;
  }
  .voice-row.collapsed .event strong{
    font-size:10px;
  }
  .voice-row.collapsed .event span{
    display:none;
  }
  .empty{
    min-height:240px;
    display:grid;
    place-items:center;
    color:var(--muted);
    border-bottom:1px solid var(--line);
  }
  @media (max-width:820px){
    :root{--editor-w:350px;--beat-px:38px}
    .topbar{align-items:flex-start;flex-direction:column}
    .toolbar{margin-left:0;width:100%}
    .sig{gap:5px}
    .sig .stepper{grid-template-columns:26px 30px 26px}
    .sig .unit-option{
      min-width:26px;
      padding:0 5px;
    }
    .metric{min-width:132px}
    .voice-head{grid-template-columns:32px minmax(0,1fr) 32px 32px}
    .cycle-grid{grid-template-columns:1fr 1fr}
    .cycle-stats{grid-template-columns:1fr 1fr}
    .block-editor{grid-template-columns:1fr 1fr 1fr 32px}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>Texture Timeline</h1>
    <p>Voice cycles over a composed grid</p>
  </div>
  <div class="toolbar">
    <div class="composer-control">
      <span class="control-title">Time</span>
      <div class="sig" aria-label="Time signature">
        <div class="stepper" role="group" aria-label="Beats per bar">
          <button type="button" data-adjust="timeTop" data-delta="-1" aria-label="Decrease beats">&minus;</button>
          <output id="timeTopValue" class="stepper-value" aria-live="polite">4</output>
          <button type="button" data-adjust="timeTop" data-delta="1" aria-label="Increase beats">+</button>
        </div>
        <span class="signature-mark">/</span>
        <div class="unit-options" role="group" aria-label="Beat unit">
          <button class="unit-option" type="button" data-time-bottom="2">2</button>
          <button class="unit-option active" type="button" data-time-bottom="4">4</button>
          <button class="unit-option" type="button" data-time-bottom="8">8</button>
          <button class="unit-option" type="button" data-time-bottom="16">16</button>
        </div>
      </div>
    </div>
    <div class="composer-control bar-control">
      <span class="control-title">Bars</span>
      <div class="stepper" role="group" aria-label="Bar count">
        <button type="button" data-adjust="barCount" data-delta="-1" aria-label="Decrease bars">&minus;</button>
        <output id="barCountValue" class="stepper-value" aria-live="polite">8</output>
        <button type="button" data-adjust="barCount" data-delta="1" aria-label="Increase bars">+</button>
      </div>
    </div>
    <label class="tempo-unit">Tempo unit
      <select id="tempoUnit">
        <option value="s">s</option>
        <option value="e">e</option>
        <option value="e.">e.</option>
        <option value="q" selected>q</option>
        <option value="q.">q.</option>
        <option value="h">h</option>
        <option value="h.">h.</option>
      </select>
    </label>
    <label class="tempo-bpm">Tempo
      <input id="tempoBpm" type="number" min="20" max="240" step="1" value="60">
    </label>
    <div class="metric">
      <span>Timeline</span>
      <b id="pieceLength">0 beats</b>
    </div>
    <button id="playBtn" class="primary transport-button" type="button">Play</button>
    <button id="addRowTop" class="primary" type="button">+ Voice</button>
  </div>
</header>

<main class="board" id="board">
  <div class="timeline-content" id="timelineContent">
    <div class="ruler-row">
      <div class="corner">
        <span>Voices / Cycles</span>
        <button id="addRowCorner" class="icon" type="button" aria-label="Add voice">+</button>
      </div>
      <div class="ruler" id="ruler"></div>
    </div>
    <div id="rows"></div>
  </div>
</main>

<script>
"use strict";

const RHYTHMS = [
  { token:"s", quarterBeats:0.25 },
  { token:"e", quarterBeats:0.5 },
  { token:"e.", quarterBeats:0.75 },
  { token:"q", quarterBeats:1 },
  { token:"q.", quarterBeats:1.5 },
  { token:"h", quarterBeats:2 },
  { token:"h.", quarterBeats:3 },
  { token:"w", quarterBeats:4 }
];

const PALETTE = ["#2f7ea7","#b96b38","#5f8f48","#9a5fa8","#bd4540","#3f776f","#c29a27","#6a77b8"];
const rhythmByToken = new Map(RHYTHMS.map((rhythm) => [rhythm.token, rhythm]));
let idSeq = 0;

function createId(prefix){
  idSeq += 1;
  return `${prefix}${idSeq.toString(36)}`;
}

function createBlock(rhythm, pitchMode, pitch){
  return { id:createId("blk"), rhythm, pitchMode, pitch };
}

function createCycle(opts){
  return {
    id:createId("cyc"),
    name:opts.name || "Cycle",
    color:opts.color || PALETTE[0],
    repetitions:opts.repetitions ?? 4,
    entropy:opts.entropy ?? 12,
    transition:opts.transition ?? 1,
    blocks:(opts.blocks || [
      createBlock("q","change","C4"),
      createBlock("e","hold",""),
      createBlock("e","change","D4")
    ]).map((block) => ({...block}))
  };
}

function createRow(index){
  const first = createCycle({
    name:"Cycle A",
    color:PALETTE[(index - 1) % PALETTE.length],
    repetitions:4,
    entropy:10,
    transition:1,
    blocks:[
      createBlock("e","change","C4"),
      createBlock("e","hold",""),
      createBlock("q","change","D4"),
      createBlock("q.","hold","")
    ]
  });
  const second = createCycle({
    name:"Cycle B",
    color:PALETTE[index % PALETTE.length],
    repetitions:4,
    entropy:28,
    transition:0,
    blocks:[
      createBlock("q","change","E4"),
      createBlock("e","hold",""),
      createBlock("e","change","G4"),
      createBlock("h","hold","")
    ]
  });
  return {
    id:createId("row"),
    name:`Voice ${index}`,
    collapsed:false,
    selectedCycleId:first.id,
    cycles:[first, second]
  };
}

const state = {
  timeTop:4,
  timeBottom:4,
  barCount:8,
  tempoUnit:"q",
  tempoBpm:60,
  rows:[createRow(1)]
};

const transport = {
  playing:false,
  beat:0,
  startedAt:0,
  startedBeat:0,
  raf:0,
  schedIdx:0,
  events:[]
};
let audioCtx = null;
let masterGain = null;

const rowsEl = document.getElementById("rows");
const rulerEl = document.getElementById("ruler");
const timelineContentEl = document.getElementById("timelineContent");
const pieceLengthEl = document.getElementById("pieceLength");
const timeTopValueEl = document.getElementById("timeTopValue");
const barCountValueEl = document.getElementById("barCountValue");
const tempoUnitEl = document.getElementById("tempoUnit");
const tempoBpmEl = document.getElementById("tempoBpm");
const playBtn = document.getElementById("playBtn");
const timeBottomButtons = Array.from(document.querySelectorAll("[data-time-bottom]"));
const settingAdjustButtons = Array.from(document.querySelectorAll("[data-adjust]"));

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function clamp(value, min, max){
  return Math.max(min, Math.min(max, value));
}

function lerp(a, b, t){
  return a + (b - a) * t;
}

function beatUnitQuarterValue(){
  return 4 / state.timeBottom;
}

function tempoUnitQuarterValue(){
  return rhythmByToken.get(state.tempoUnit)?.quarterBeats || 1;
}

function secondsPerBeat(){
  const secondsPerTempoUnit = 60 / state.tempoBpm;
  const secondsPerQuarter = secondsPerTempoUnit / tempoUnitQuarterValue();
  return secondsPerQuarter * beatUnitQuarterValue();
}

function beatsToSeconds(beats){
  return beats * secondsPerBeat();
}

function secondsToBeats(seconds){
  return seconds / secondsPerBeat();
}

function rhythmBeats(token){
  const rhythm = rhythmByToken.get(token) || rhythmByToken.get("q");
  return rhythm.quarterBeats / beatUnitQuarterValue();
}

function formatBeats(value){
  if (!Number.isFinite(value)) return "0";
  const rounded = Math.round(value * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2).replace(/0+$/,"").replace(/\.$/,"");
}

function formatSeconds(value){
  if (!Number.isFinite(value)) return "0:00";
  const total = Math.max(0, Math.round(value));
  const minutes = Math.floor(total / 60);
  const seconds = String(total % 60).padStart(2,"0");
  return `${minutes}:${seconds}`;
}

function patternBeats(cycle){
  return cycle.blocks.reduce((total, block) => total + rhythmBeats(block.rhythm), 0);
}

function cycleBeats(cycle){
  return patternBeats(cycle) * Math.max(0, Number(cycle.repetitions) || 0);
}

function rowBeats(row){
  return row.cycles.reduce((total, cycle) => total + cycleBeats(cycle), 0);
}

function gridBeats(){
  return state.timeTop * state.barCount;
}

function compositionBeats(){
  return Math.max(gridBeats(), ...state.rows.map(rowBeats), 1);
}

function syncPieceControls(){
  timeTopValueEl.textContent = state.timeTop;
  barCountValueEl.textContent = state.barCount;
  tempoUnitEl.value = state.tempoUnit;
  tempoBpmEl.value = state.tempoBpm;
  playBtn.textContent = transport.playing ? "Pause" : "Play";
  timeBottomButtons.forEach((button) => {
    const active = Number(button.dataset.timeBottom) === state.timeBottom;
    button.classList.toggle("active", active);
    button.setAttribute("aria-pressed", String(active));
  });
  settingAdjustButtons.forEach((button) => {
    const field = button.dataset.adjust;
    const delta = Number(button.dataset.delta) || 0;
    const value = state[field];
    const min = field === "timeTop" ? 1 : 1;
    const max = field === "timeTop" ? 24 : 512;
    button.disabled = value + delta < min || value + delta > max;
  });
}

function rhythmOptions(selected){
  return RHYTHMS.map((rhythm) => {
    const isSelected = rhythm.token === selected ? " selected" : "";
    return `<option value="${rhythm.token}"${isSelected}>${rhythm.token}</option>`;
  }).join("");
}

function pitchModeOptions(selected){
  return ["change","hold"].map((mode) => {
    const isSelected = mode === selected ? " selected" : "";
    const label = mode === "change" ? "Change" : "Hold";
    return `<option value="${mode}"${isSelected}>${label}</option>`;
  }).join("");
}

function selectedCycle(row){
  let cycle = row.cycles.find((candidate) => candidate.id === row.selectedCycleId);
  if (!cycle){
    cycle = row.cycles[0];
    row.selectedCycleId = cycle ? cycle.id : null;
  }
  return cycle;
}

function cycleIndex(row, cycle){
  return row.cycles.findIndex((candidate) => candidate.id === cycle.id);
}

function getBeatPx(){
  return window.matchMedia("(max-width: 820px)").matches ? 38 : 44;
}

function render(){
  syncPieceControls();
  const beatPx = getBeatPx();
  const measurePx = state.timeTop * beatPx;
  const timelineWidth = Math.ceil(compositionBeats() * beatPx);
  timelineContentEl.style.setProperty("--beat-px", `${beatPx}px`);
  timelineContentEl.style.setProperty("--measure-px", `${measurePx}px`);
  timelineContentEl.style.setProperty("--timeline-w", `${timelineWidth}px`);
  pieceLengthEl.textContent = `${formatBeats(compositionBeats())} beats · ${formatSeconds(beatsToSeconds(compositionBeats()))}`;
  renderRuler(timelineWidth, beatPx);
  renderRows(beatPx);
}

function renderRuler(timelineWidth, beatPx){
  const measureBeats = state.timeTop;
  const total = compositionBeats();
  const labels = [];
  for (let measure = 0; measure <= Math.ceil(total / measureBeats); measure += 1){
    const left = measure * measureBeats * beatPx;
    labels.push(`<span class="measure-label" style="left:${left}px">m${measure + 1}</span>`);
  }
  for (let beat = 0; beat <= Math.ceil(total); beat += 1){
    const left = beat * beatPx;
    labels.push(`<span class="beat-label" style="left:${left}px">${beat}</span>`);
  }
  rulerEl.style.width = `${timelineWidth}px`;
  rulerEl.innerHTML = labels.join("");
}

function renderRows(beatPx){
  if (state.rows.length === 0){
    rowsEl.innerHTML = `<div class="empty">No voices</div>`;
    return;
  }
  rowsEl.innerHTML = state.rows.map((row) => renderRow(row, beatPx)).join("");
}

function renderRow(row, beatPx){
  const total = rowBeats(row);
  const events = renderEvents(row, beatPx, row.collapsed);
  const regions = renderCycleRegions(row, beatPx);
  const lines = renderRepetitionLines(row, beatPx);
  const playhead = renderPlayhead(beatPx);
  if (row.collapsed){
    return `
      <section class="voice-row collapsed" data-row-id="${row.id}">
        <div class="voice-editor">
          <div class="voice-collapsed">
            <button class="icon" type="button" data-action="toggle-collapse" aria-label="Expand ${escapeHtml(row.name)}">+</button>
            <div class="voice-summary">
              <strong>${escapeHtml(row.name)}</strong>
              <span>${row.cycles.length} cycles &middot; ${formatBeats(total)} beats total</span>
              <div class="compact-cycles">${renderCompactCycles(row)}</div>
            </div>
            <button class="icon danger" type="button" data-action="delete-row" aria-label="Delete ${escapeHtml(row.name)}">x</button>
          </div>
        </div>
        <div class="lane-cell">
          ${regions}
          <div class="lane-axis">${lines}</div>
          ${playhead}
          ${events}
        </div>
      </section>
    `;
  }
  const cycle = selectedCycle(row);
  return `
    <section class="voice-row" data-row-id="${row.id}">
      <div class="voice-editor">
        <div class="voice-head">
          <button class="icon" type="button" data-action="toggle-collapse" aria-label="Collapse ${escapeHtml(row.name)}">-</button>
          <label>Voice
            <input data-scope="row" data-field="name" value="${escapeHtml(row.name)}" autocomplete="off">
          </label>
          <button class="icon" type="button" data-action="add-cycle" aria-label="Add cycle">+</button>
          <button class="icon danger" type="button" data-action="delete-row" aria-label="Delete ${escapeHtml(row.name)}">x</button>
        </div>
        ${renderCycleTabs(row)}
        ${renderCycleEditor(row, cycle)}
      </div>
      <div class="lane-cell">
        ${regions}
        <div class="lane-axis">${lines}</div>
        ${playhead}
        ${events}
      </div>
    </section>
  `;
}

function renderPlayhead(beatPx){
  if (!transport.playing && transport.beat <= 0) return "";
  const left = clamp(transport.beat, 0, compositionBeats()) * beatPx;
  return `<div class="playhead" style="left:${left}px"></div>`;
}

function renderCompactCycles(row){
  return row.cycles.map((cycle) => `
    <span class="cycle-chip" style="border-left-color:${cycle.color}">
      ${escapeHtml(cycle.name)} · ${cycle.repetitions}x · ${cycle.entropy}%
    </span>
  `).join("");
}

function renderCycleTabs(row){
  return `
    <div class="cycle-tabs">
      ${row.cycles.map((cycle) => {
        const selected = cycle.id === row.selectedCycleId ? " selected" : "";
        return `
          <button class="cycle-tab${selected}" type="button" data-action="select-cycle" data-cycle-id="${cycle.id}">
            <span class="swatch" style="background:${cycle.color}"></span>
            <span>${escapeHtml(cycle.name)}</span>
          </button>
        `;
      }).join("")}
    </div>
  `;
}

function renderCycleEditor(row, cycle){
  const index = cycleIndex(row, cycle);
  const isLast = index === row.cycles.length - 1;
  const pattern = patternBeats(cycle);
  const total = cycleBeats(cycle);
  const transitionMax = Math.max(0, Math.floor(Number(cycle.repetitions) || 0));
  const transitionDisabled = isLast ? " disabled" : "";
  const blocks = cycle.blocks.map((block, blockIndex) => renderBlockEditor(block, blockIndex)).join("");
  return `
    <div class="cycle-panel" data-cycle-id="${cycle.id}">
      <div class="cycle-grid">
        <label>Cycle
          <input data-scope="cycle" data-field="name" value="${escapeHtml(cycle.name)}" autocomplete="off">
        </label>
        <label>Reps
          <input data-scope="cycle" data-field="repetitions" type="number" min="1" max="128" step="1" value="${escapeHtml(cycle.repetitions)}">
        </label>
        <label>Entropy
          <input data-scope="cycle" data-field="entropy" type="range" min="0" max="100" step="1" value="${escapeHtml(cycle.entropy)}">
        </label>
        <label>Transition reps
          <input data-scope="cycle" data-field="transition" type="number" min="0" max="${transitionMax}" step="1" value="${escapeHtml(cycle.transition)}"${transitionDisabled}>
        </label>
        <label>Color
          <input data-scope="cycle" data-field="color" type="color" value="${escapeHtml(cycle.color)}">
        </label>
      </div>
      <div class="cycle-stats">
        <div class="stat"><span>Pattern</span><b>${formatBeats(pattern)} beats</b></div>
        <div class="stat"><span>Total</span><b>${formatBeats(total)} beats</b></div>
        <div class="stat"><span>Entropy</span><b>${cycle.entropy}%</b></div>
        <div class="stat"><span>Transition</span><b>${isLast ? "none" : `${cycle.transition} reps`}</b></div>
      </div>
      <div class="block-list">
        ${blocks}
      </div>
      <div class="row-actions">
        <button type="button" data-action="add-block">+ Block</button>
        <button type="button" class="danger" data-action="delete-cycle"${row.cycles.length <= 1 ? " disabled" : ""}>Delete Cycle</button>
      </div>
    </div>
  `;
}

function renderBlockEditor(block, index){
  const pitchDisabled = block.pitchMode === "hold" ? " disabled" : "";
  const pitchValue = block.pitchMode === "hold" ? "" : block.pitch;
  const pitchPlaceholder = block.pitchMode === "hold" ? "held" : "C4";
  return `
    <div class="block-editor" data-block-id="${block.id}">
      <label>Rhythm
        <select data-scope="block" data-field="rhythm">${rhythmOptions(block.rhythm)}</select>
      </label>
      <label>Pitch
        <select data-scope="block" data-field="pitchMode">${pitchModeOptions(block.pitchMode)}</select>
      </label>
      <label>Value
        <input class="pitch-input" data-scope="block" data-field="pitch" value="${escapeHtml(pitchValue)}" placeholder="${pitchPlaceholder}"${pitchDisabled} autocomplete="off">
      </label>
      <button class="icon danger" type="button" data-action="delete-block" aria-label="Delete block ${index + 1}">x</button>
    </div>
  `;
}

function renderCycleRegions(row, beatPx){
  let start = 0;
  const selected = selectedCycle(row);
  const regions = row.cycles.map((cycle, index) => {
    const total = cycleBeats(cycle);
    const width = Math.max(total * beatPx, 1);
    const next = row.cycles[index + 1];
    const pattern = patternBeats(cycle);
    const transitionReps = next ? clamp(Number(cycle.transition) || 0, 0, cycle.repetitions) : 0;
    const transitionBeats = transitionReps * pattern;
    const transitionWidth = Math.min(width, transitionBeats * beatPx);
    const selectedClass = selected && selected.id === cycle.id ? " selected" : "";
    const region = `
      <div class="cycle-region${selectedClass}"
        data-action="select-cycle"
        data-cycle-id="${cycle.id}"
        style="left:${start * beatPx}px;width:${width}px;--cycle-color:${cycle.color};--cycle-bg:${rgba(cycle.color,.16)}">
        <div class="cycle-region-label">
          <span class="swatch" style="background:${cycle.color}"></span>
          <span>${escapeHtml(cycle.name)}</span>
          <small>${cycle.repetitions} reps · ${cycle.entropy}%</small>
        </div>
        ${next && transitionWidth > 0 ? `<div class="transition-band" style="width:${transitionWidth}px;--transition-bg:linear-gradient(to right,${rgba(cycle.color,.08)},${rgba(next.color,.26)})"></div>` : ""}
      </div>
    `;
    start += total;
    return region;
  });
  return regions.join("");
}

function renderRepetitionLines(row, beatPx){
  let start = 0;
  const lines = [];
  for (const cycle of row.cycles){
    const pattern = patternBeats(cycle);
    const repetitions = Math.max(0, Math.floor(Number(cycle.repetitions) || 0));
    for (let rep = 1; rep <= repetitions; rep += 1){
      const left = (start + pattern * rep) * beatPx;
      const cls = rep === repetitions ? "repeat-line cycle-boundary" : "repeat-line";
      lines.push(`<div class="${cls}" style="left:${left}px"></div>`);
    }
    start += pattern * repetitions;
  }
  return lines.join("");
}

function renderEvents(row, beatPx, collapsed){
  const events = buildRowEvents(row);
  return events.map((event) => {
    const left = Math.max(0, event.start * beatPx);
    const width = Math.max(event.duration * beatPx, collapsed ? 10 : 14);
    const top = collapsed ? 40 + (event.lane % 2) * 17 : 56 + event.lane * 31;
    const height = collapsed ? 18 : 28;
    const addedClass = event.added ? " added" : "";
    const label = event.added ? `+${event.rhythm}` : event.rhythm;
    return `
      <div class="event${addedClass}"
        style="left:${left}px;top:${top}px;width:${width}px;height:${height}px;--event-bg:${rgba(event.color,.22)};--event-border:${rgba(event.color,.68)}">
        <div class="event-inner">
          <strong>${escapeHtml(label)}</strong>
          <span>${escapeHtml(event.pitch || "--")}</span>
        </div>
      </div>
    `;
  }).join("");
}

function buildRowEvents(row){
  const events = [];
  let cycleStart = 0;
  for (let cycleIndexValue = 0; cycleIndexValue < row.cycles.length; cycleIndexValue += 1){
    const cycle = row.cycles[cycleIndexValue];
    const next = row.cycles[cycleIndexValue + 1];
    const pattern = patternBeats(cycle);
    const repetitions = Math.max(0, Math.floor(Number(cycle.repetitions) || 0));
    const cycleTotal = pattern * repetitions;
    if (pattern <= 0 || repetitions <= 0){
      cycleStart += cycleTotal;
      continue;
    }
    const transitionReps = next ? clamp(Number(cycle.transition) || 0, 0, repetitions) : 0;
    const transitionStart = Math.max(0, repetitions - transitionReps) * pattern;
    const transitionBeats = transitionReps * pattern;
    for (let rep = 0; rep < repetitions; rep += 1){
      let blockStart = 0;
      for (let blockIndexValue = 0; blockIndexValue < cycle.blocks.length; blockIndexValue += 1){
        const block = cycle.blocks[blockIndexValue];
        const baseDuration = rhythmBeats(block.rhythm);
        const localStart = rep * pattern + blockStart;
        const phase = pattern > 0 ? clamp((blockStart + baseDuration * .5) / pattern, 0, .999) : 0;
        const mix = next && transitionBeats > 0 && localStart >= transitionStart
          ? clamp((localStart - transitionStart + baseDuration * .5) / transitionBeats, 0, 1)
          : 0;
        const rng = mulberry32(hashString(`${row.id}|${cycle.id}|${rep}|${block.id}`));
        const entropy = (next ? lerp(cycle.entropy, next.entropy, mix) : cycle.entropy) / 100;
        const nextBlock = next ? blockAtPhase(next, phase) : null;
        const skipChance = entropy * .14;
        if (rng() >= skipChance){
          let rhythm = block.rhythm;
          let duration = baseDuration;
          if (nextBlock && rng() < mix * .72){
            rhythm = nextBlock.rhythm;
          }
          if (nextBlock){
            duration = lerp(baseDuration, rhythmBeats(nextBlock.rhythm), mix * .65);
          }
          duration *= 1 + (rng() * 2 - 1) * entropy * .22;
          duration = Math.max(.12, duration);

          let pitch = pitchAtPhase(cycle, phase);
          const nextPitch = next ? pitchAtPhase(next, phase) : "";
          if (nextPitch && rng() < mix * .78){
            pitch = nextPitch;
          }
          if (pitch && rng() < entropy * .28){
            pitch = transposePitch(pitch, rng() < .5 ? -1 : 1);
          }

          const jitter = (rng() * 2 - 1) * Math.min(baseDuration * .33, .45) * entropy;
          const start = clamp(cycleStart + localStart + jitter, cycleStart, cycleStart + cycleTotal - .05);
          const color = next ? blendHex(cycle.color, next.color, mix) : cycle.color;
          events.push({
            start,
            duration,
            rhythm,
            pitch,
            color,
            lane:Math.floor(rng() * 5),
            added:false
          });
        }

        if (rng() < entropy * .2){
          const anchorPitch = pitchAtPhase(cycle, phase) || (next ? pitchAtPhase(next, phase) : "");
          const addStart = cycleStart + localStart + baseDuration * (.2 + rng() * .65);
          const addDuration = Math.max(.1, baseDuration * (.2 + rng() * .35));
          const color = next ? blendHex(cycle.color, next.color, mix) : cycle.color;
          events.push({
            start:clamp(addStart, cycleStart, cycleStart + cycleTotal - .05),
            duration:addDuration,
            rhythm:block.rhythm,
            pitch:anchorPitch ? transposePitch(anchorPitch, rng() < .5 ? -1 : 1) : "",
            color,
            lane:Math.floor(rng() * 5),
            added:true
          });
        }

        blockStart += baseDuration;
      }
    }
    cycleStart += cycleTotal;
  }
  events.sort((a, b) => a.start - b.start);
  return events;
}

function buildPlaybackEvents(){
  const events = [];
  for (const row of state.rows){
    for (const event of buildRowEvents(row)){
      const midi = pitchToMidi(event.pitch);
      if (midi === null) continue;
      events.push({
        start:event.start,
        duration:event.duration,
        midi,
        color:event.color
      });
    }
  }
  events.sort((a, b) => a.start - b.start);
  return events;
}

function ensureAudio(){
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.72;
  masterGain.connect(audioCtx.destination);
}

function startTransport(){
  ensureAudio();
  audioCtx.resume();
  transport.events = buildPlaybackEvents();
  transport.schedIdx = transport.events.findIndex((event) => event.start >= transport.beat);
  if (transport.schedIdx < 0) transport.schedIdx = transport.events.length;
  transport.startedBeat = transport.beat;
  transport.startedAt = audioCtx.currentTime;
  transport.playing = true;
  tickTransport();
}

function pauseTransport(){
  transport.playing = false;
  cancelAnimationFrame(transport.raf);
  render();
}

function toggleTransport(){
  if (transport.playing){
    pauseTransport();
  } else {
    if (transport.beat >= compositionBeats()) transport.beat = 0;
    startTransport();
  }
}

function resyncTransportAfterEdit(){
  if (!transport.playing) return;
  transport.startedBeat = clamp(transport.beat, 0, compositionBeats());
  transport.startedAt = audioCtx.currentTime;
  transport.events = buildPlaybackEvents();
  transport.schedIdx = transport.events.findIndex((event) => event.start >= transport.beat);
  if (transport.schedIdx < 0) transport.schedIdx = transport.events.length;
}

function renderAfterScoreEdit(){
  transport.beat = clamp(transport.beat, 0, compositionBeats());
  resyncTransportAfterEdit();
  render();
}

function tickTransport(){
  if (!transport.playing) return;
  const elapsed = audioCtx.currentTime - transport.startedAt;
  transport.beat = transport.startedBeat + secondsToBeats(elapsed);
  if (transport.beat >= compositionBeats()){
    transport.beat = compositionBeats();
    pauseTransport();
    return;
  }
  schedulePlayback();
  render();
  transport.raf = requestAnimationFrame(tickTransport);
}

function schedulePlayback(){
  const lookaheadSeconds = .18;
  const lookaheadBeats = secondsToBeats(lookaheadSeconds);
  const horizon = transport.beat + lookaheadBeats;
  const now = audioCtx.currentTime;
  while (transport.schedIdx < transport.events.length && transport.events[transport.schedIdx].start <= horizon){
    const event = transport.events[transport.schedIdx];
    transport.schedIdx += 1;
    if (event.start < transport.beat - .02) continue;
    const when = now + beatsToSeconds(event.start - transport.beat);
    playPianoTone(when, beatsToSeconds(event.duration), event.midi);
  }
}

function playPianoTone(when, duration, midi){
  const freq = 440 * Math.pow(2, (midi - 69) / 12);
  const voiceGain = audioCtx.createGain();
  const body = audioCtx.createOscillator();
  const shine = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const safeDuration = clamp(duration, .08, 8);
  body.type = "triangle";
  shine.type = "sine";
  body.frequency.setValueAtTime(freq, when);
  shine.frequency.setValueAtTime(freq * 2.01, when);
  filter.type = "lowpass";
  filter.frequency.setValueAtTime(2600, when);
  filter.frequency.exponentialRampToValueAtTime(900, when + Math.min(.7, safeDuration));
  voiceGain.gain.setValueAtTime(.0001, when);
  voiceGain.gain.exponentialRampToValueAtTime(.16, when + .012);
  voiceGain.gain.exponentialRampToValueAtTime(.055, when + Math.min(.28, safeDuration * .55));
  voiceGain.gain.exponentialRampToValueAtTime(.0001, when + safeDuration);
  body.connect(filter);
  shine.connect(filter);
  filter.connect(voiceGain);
  voiceGain.connect(masterGain);
  body.start(when);
  shine.start(when);
  body.stop(when + safeDuration + .08);
  shine.stop(when + safeDuration + .08);
}

function blockAtPhase(cycle, phase){
  const pattern = patternBeats(cycle);
  if (pattern <= 0 || cycle.blocks.length === 0) return null;
  const target = clamp(phase, 0, .999) * pattern;
  let start = 0;
  for (const block of cycle.blocks){
    const duration = rhythmBeats(block.rhythm);
    if (target >= start && target < start + duration){
      return block;
    }
    start += duration;
  }
  return cycle.blocks[cycle.blocks.length - 1];
}

function pitchAtPhase(cycle, phase){
  const pattern = patternBeats(cycle);
  if (pattern <= 0 || cycle.blocks.length === 0) return "";
  const target = clamp(phase, 0, .999) * pattern;
  let start = 0;
  let currentPitch = "";
  for (const block of cycle.blocks){
    if (block.pitchMode === "change" && block.pitch.trim()){
      currentPitch = block.pitch.trim();
    }
    const duration = rhythmBeats(block.rhythm);
    if (target >= start && target < start + duration){
      return currentPitch;
    }
    start += duration;
  }
  return currentPitch;
}

const NOTE_TO_PC = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
const PC_TO_NOTE = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

function pitchToMidi(pitch){
  const match = String(pitch || "").trim().match(/^([A-Ga-g])([#b]?)(-?\d+)$/);
  if (!match) return null;
  let pc = NOTE_TO_PC[match[1].toUpperCase()];
  if (match[2] === "#") pc += 1;
  if (match[2] === "b") pc -= 1;
  return (Number(match[3]) + 1) * 12 + pc;
}

function transposePitch(pitch, semitones){
  const baseMidi = pitchToMidi(pitch);
  if (baseMidi === null) return pitch;
  const midi = baseMidi + semitones;
  const nextPc = ((midi % 12) + 12) % 12;
  const nextOctave = Math.floor(midi / 12) - 1;
  return `${PC_TO_NOTE[nextPc]}${nextOctave}`;
}

function hashString(value){
  let hash = 2166136261;
  for (let i = 0; i < value.length; i += 1){
    hash ^= value.charCodeAt(i);
    hash = Math.imul(hash, 16777619);
  }
  return hash >>> 0;
}

function mulberry32(seed){
  return function(){
    seed |= 0;
    seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function hexToRgb(hex){
  const clean = String(hex).replace("#","");
  const value = Number.parseInt(clean.length === 3
    ? clean.split("").map((char) => char + char).join("")
    : clean, 16);
  if (!Number.isFinite(value)) return {r:0,g:0,b:0};
  return {
    r:(value >> 16) & 255,
    g:(value >> 8) & 255,
    b:value & 255
  };
}

function rgba(hex, alpha){
  const rgb = hexToRgb(hex);
  return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
}

function blendHex(a, b, t){
  const ar = hexToRgb(a);
  const br = hexToRgb(b);
  const r = Math.round(lerp(ar.r, br.r, t));
  const g = Math.round(lerp(ar.g, br.g, t));
  const blue = Math.round(lerp(ar.b, br.b, t));
  return `#${[r,g,blue].map((value) => value.toString(16).padStart(2,"0")).join("")}`;
}

function findRow(id){
  return state.rows.find((row) => row.id === id);
}

function findBlock(cycle, id){
  return cycle.blocks.find((block) => block.id === id);
}

function addRow(){
  state.rows.push(createRow(state.rows.length + 1));
  renderAfterScoreEdit();
}

function cloneCycle(source, index){
  return createCycle({
    name:`Cycle ${String.fromCharCode(65 + (index % 26))}`,
    color:PALETTE[index % PALETTE.length],
    repetitions:source.repetitions,
    entropy:source.entropy,
    transition:1,
    blocks:source.blocks.map((block) => createBlock(block.rhythm, block.pitchMode, block.pitch))
  });
}

function addCycle(row){
  const source = selectedCycle(row);
  const sourceIndex = cycleIndex(row, source);
  const nextCycle = cloneCycle(source, row.cycles.length);
  row.cycles.splice(sourceIndex + 1, 0, nextCycle);
  row.selectedCycleId = nextCycle.id;
}

function addBlock(cycle){
  cycle.blocks.push(createBlock("q","hold",""));
}

function handleRowChange(event){
  const target = event.target;
  const rowEl = target.closest(".voice-row");
  if (!rowEl) return;
  const row = findRow(rowEl.dataset.rowId);
  if (!row) return;
  const cycle = selectedCycle(row);
  const blockEl = target.closest(".block-editor");

  if (target.dataset.scope === "row" && target.dataset.field === "name"){
    row.name = target.value.trim() || "Voice";
    renderAfterScoreEdit();
    return;
  }

  if (blockEl){
    const block = findBlock(cycle, blockEl.dataset.blockId);
    if (!block) return;
    if (target.dataset.field === "rhythm"){
      block.rhythm = target.value;
    }
    if (target.dataset.field === "pitchMode"){
      block.pitchMode = target.value;
    }
    if (target.dataset.field === "pitch"){
      block.pitch = target.value.trim();
    }
    renderAfterScoreEdit();
    return;
  }

  if (target.dataset.scope === "cycle"){
    if (target.dataset.field === "name"){
      cycle.name = target.value.trim() || "Cycle";
    }
    if (target.dataset.field === "repetitions"){
      cycle.repetitions = clamp(Math.floor(Number(target.value) || 1), 1, 128);
      cycle.transition = clamp(cycle.transition, 0, cycle.repetitions);
    }
    if (target.dataset.field === "entropy"){
      cycle.entropy = clamp(Math.floor(Number(target.value) || 0), 0, 100);
    }
    if (target.dataset.field === "transition"){
      cycle.transition = clamp(Math.floor(Number(target.value) || 0), 0, cycle.repetitions);
    }
    if (target.dataset.field === "color" && /^#[0-9a-fA-F]{6}$/.test(target.value)){
      cycle.color = target.value;
    }
    renderAfterScoreEdit();
  }
}

function handleRowClick(event){
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget || actionTarget.disabled) return;
  const rowEl = actionTarget.closest(".voice-row");
  const row = rowEl ? findRow(rowEl.dataset.rowId) : null;
  if (actionTarget.dataset.action === "delete-row" && row){
    state.rows = state.rows.filter((candidate) => candidate.id !== row.id);
    renderAfterScoreEdit();
  }
  if (actionTarget.dataset.action === "toggle-collapse" && row){
    row.collapsed = !row.collapsed;
    render();
  }
  if (actionTarget.dataset.action === "add-cycle" && row){
    addCycle(row);
    renderAfterScoreEdit();
  }
  if (actionTarget.dataset.action === "select-cycle" && row){
    row.selectedCycleId = actionTarget.dataset.cycleId;
    render();
  }
  if (actionTarget.dataset.action === "delete-cycle" && row){
    if (row.cycles.length <= 1) return;
    const cycle = selectedCycle(row);
    const index = cycleIndex(row, cycle);
    row.cycles = row.cycles.filter((candidate) => candidate.id !== cycle.id);
    row.selectedCycleId = row.cycles[Math.max(0, Math.min(index, row.cycles.length - 1))].id;
    renderAfterScoreEdit();
  }
  if (actionTarget.dataset.action === "add-block" && row){
    addBlock(selectedCycle(row));
    renderAfterScoreEdit();
  }
  if (actionTarget.dataset.action === "delete-block" && row){
    const cycle = selectedCycle(row);
    const blockEl = actionTarget.closest(".block-editor");
    if (!blockEl) return;
    cycle.blocks = cycle.blocks.filter((block) => block.id !== blockEl.dataset.blockId);
    if (cycle.blocks.length === 0){
      addBlock(cycle);
    }
    renderAfterScoreEdit();
  }
}

function updatePieceSetting(field, value){
  if (field === "timeTop"){
    state.timeTop = clamp(Math.floor(value) || 1, 1, 24);
  } else if (field === "timeBottom"){
    state.timeBottom = clamp(Math.floor(value) || 4, 1, 32);
  } else if (field === "barCount"){
    state.barCount = clamp(Math.floor(value) || 1, 1, 512);
  } else if (field === "tempoUnit"){
    state.tempoUnit = rhythmByToken.has(value) ? value : "q";
  } else if (field === "tempoBpm"){
    state.tempoBpm = clamp(Math.floor(value) || 60, 20, 240);
  }
  renderAfterScoreEdit();
}

rowsEl.addEventListener("change", handleRowChange);
rowsEl.addEventListener("click", handleRowClick);
document.getElementById("addRowTop").addEventListener("click", addRow);
document.getElementById("addRowCorner").addEventListener("click", addRow);
settingAdjustButtons.forEach((button) => {
  button.addEventListener("click", () => {
    const field = button.dataset.adjust;
    updatePieceSetting(field, state[field] + (Number(button.dataset.delta) || 0));
  });
});
timeBottomButtons.forEach((button) => {
  button.addEventListener("click", () => {
    updatePieceSetting("timeBottom", Number(button.dataset.timeBottom));
  });
});
tempoUnitEl.addEventListener("change", () => {
  updatePieceSetting("tempoUnit", tempoUnitEl.value);
});
tempoBpmEl.addEventListener("change", () => {
  updatePieceSetting("tempoBpm", Number(tempoBpmEl.value));
});
playBtn.addEventListener("click", toggleTransport);
window.addEventListener("resize", render);

render();
</script>
