<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Texture Timeline</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&display=swap");

  :root{
    --bg:#f7f6f3;
    --panel:#ffffff;
    --panel-2:#fbfbfa;
    --panel-3:#f2f0eb;
    --line:#e6e1d9;
    --line-strong:#c9c1b6;
    --ink:#22211f;
    --muted:#78736c;
    --soft:#4d4943;
    --accent:#111111;
    --accent-ink:#ffffff;
    --gold:#956400;
    --red:#9f2f2d;
    --blue:#1f6c9f;
    --blue-soft:#e1f3fe;
    --green:#346538;
    --green-soft:#edf3ec;
    --editor-w:390px;
    --beat-px:44px;
    --measure-px:176px;
    --timeline-w:760px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    min-height:100vh;
    background:var(--bg);
    color:var(--ink);
    font:13px/1.45 "Figtree","SF Pro Display","Helvetica Neue",Arial,sans-serif;
  }
  button,input,select{font:inherit}
  button{
    min-height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel-2);
    color:var(--ink);
    padding:6px 10px;
    cursor:pointer;
  }
  button:hover{background:var(--panel-3);border-color:var(--line-strong)}
  button:active{transform:scale(.98)}
  button.primary{
    background:var(--accent);
    border-color:var(--accent);
    color:var(--accent-ink);
    font-weight:700;
  }
  button.danger{color:var(--red);border-color:#efd3d0}
  button.icon{
    width:32px;
    padding:0;
    display:inline-grid;
    place-items:center;
    font-weight:700;
  }
  label{
    display:flex;
    flex-direction:column;
    gap:5px;
    color:var(--muted);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  input,select{
    width:100%;
    min-height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel);
    color:var(--ink);
    padding:6px 8px;
  }
  select{appearance:auto}
  .topbar{
    position:sticky;
    top:0;
    z-index:10;
    display:flex;
    align-items:center;
    gap:18px;
    padding:12px 16px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);
  }
  .brand{min-width:190px}
  .brand h1{
    margin:0;
    font-size:15px;
    line-height:1.1;
    font-weight:750;
    letter-spacing:0;
  }
  .brand p{
    margin:4px 0 0;
    color:var(--muted);
    font-size:12px;
  }
  .toolbar{
    display:flex;
    align-items:end;
    gap:10px;
    flex-wrap:wrap;
    margin-left:auto;
  }
  .sig{
    display:grid;
    grid-template-columns:70px 16px 82px;
    align-items:end;
    gap:6px;
    min-width:178px;
  }
  .slash{
    color:var(--muted);
    min-height:32px;
    display:grid;
    place-items:center;
    font-weight:700;
  }
  .metric{
    min-width:146px;
    padding:7px 10px;
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel);
  }
  .metric span{display:block;color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.08em}
  .metric b{font-size:14px;font-variant-numeric:tabular-nums}
  .bar-count{
    width:82px;
  }
  .board{
    height:calc(100vh - 65px);
    overflow:auto;
    background:var(--bg);
  }
  .timeline-content{
    min-width:calc(var(--editor-w) + var(--timeline-w));
  }
  .ruler-row,
  .voice-row{
    display:grid;
    grid-template-columns:var(--editor-w) var(--timeline-w);
    width:calc(var(--editor-w) + var(--timeline-w));
  }
  .ruler-row{
    position:sticky;
    top:0;
    z-index:5;
    min-height:46px;
    border-bottom:1px solid var(--line);
    background:rgba(255,255,255,.94);
    backdrop-filter:blur(10px);
  }
  .corner,
  .voice-editor{
    position:sticky;
    left:0;
    z-index:4;
    background:var(--panel);
    border-right:1px solid var(--line);
  }
  .corner{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:10px 14px;
    color:var(--muted);
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
  }
  .ruler{
    position:relative;
    min-height:46px;
    background:
      repeating-linear-gradient(to right,rgba(34,33,31,.18) 0 1px,transparent 1px var(--measure-px)),
      repeating-linear-gradient(to right,rgba(34,33,31,.06) 0 1px,transparent 1px var(--beat-px));
  }
  .measure-label{
    position:absolute;
    top:7px;
    transform:translateX(6px);
    color:var(--soft);
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }
  .beat-label{
    position:absolute;
    bottom:6px;
    transform:translateX(6px);
    color:var(--muted);
    font-size:10px;
    font-variant-numeric:tabular-nums;
  }
  .voice-row{
    min-height:182px;
    border-bottom:1px solid var(--line);
  }
  .voice-row.collapsed{
    min-height:72px;
  }
  .voice-editor{
    padding:14px;
  }
  .voice-head{
    display:grid;
    grid-template-columns:32px minmax(0,1fr) 86px 32px;
    gap:8px;
    align-items:end;
    margin-bottom:12px;
  }
  .voice-collapsed{
    display:grid;
    grid-template-columns:32px minmax(0,1fr) 32px;
    gap:10px;
    align-items:center;
    width:100%;
  }
  .voice-row.collapsed .voice-editor{
    display:flex;
    align-items:center;
    padding:10px 14px;
  }
  .voice-summary{
    min-width:0;
  }
  .voice-summary strong{
    display:block;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
    font-size:13px;
  }
  .voice-summary span{
    display:block;
    margin-top:2px;
    color:var(--muted);
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }
  .compact-sequence{
    display:flex;
    gap:4px;
    margin-top:7px;
    overflow:hidden;
  }
  .rhythm-chip{
    flex:none;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--panel-2);
    color:var(--soft);
    padding:2px 5px;
    font-size:11px;
    line-height:1.2;
    white-space:nowrap;
  }
  .voice-stats{
    display:grid;
    grid-template-columns:repeat(3,minmax(0,1fr));
    gap:7px;
    margin-bottom:12px;
  }
  .stat{
    border:1px solid var(--line);
    border-radius:6px;
    background:var(--panel-2);
    padding:7px 8px;
    min-width:0;
  }
  .stat span{
    display:block;
    color:var(--muted);
    font-size:10px;
    text-transform:uppercase;
    letter-spacing:.08em;
    white-space:nowrap;
  }
  .stat b{
    display:block;
    margin-top:2px;
    font-size:12px;
    font-variant-numeric:tabular-nums;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .block-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .block-editor{
    display:grid;
    grid-template-columns:72px 88px minmax(0,1fr) 32px;
    gap:7px;
    align-items:end;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    padding:8px;
  }
  .block-editor select,
  .block-editor input{background:var(--panel-2)}
  .pitch-input[disabled]{
    color:#aaa39a;
    background:#f4f2ee;
  }
  .row-actions{
    display:flex;
    justify-content:flex-end;
    margin-top:9px;
  }
  .lane-cell{
    position:relative;
    min-height:182px;
    background:
      repeating-linear-gradient(to right,rgba(34,33,31,.16) 0 1px,transparent 1px var(--measure-px)),
      repeating-linear-gradient(to right,rgba(34,33,31,.045) 0 1px,transparent 1px var(--beat-px)),
      #fbfbfa;
    overflow:hidden;
  }
  .voice-row.collapsed .lane-cell{
    min-height:72px;
  }
  .lane-axis{
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .cycle-line{
    position:absolute;
    top:0;
    bottom:0;
    border-left:1px dashed rgba(217,170,89,.55);
  }
  .cycle-line span{
    position:absolute;
    top:8px;
    left:6px;
    color:var(--gold);
    font-size:10px;
    font-variant-numeric:tabular-nums;
    white-space:nowrap;
  }
  .event{
    position:absolute;
    top:50%;
    min-width:14px;
    height:52px;
    transform:translateY(-50%);
    border:1px solid #c7dde9;
    border-radius:6px;
    background:var(--blue-soft);
    overflow:hidden;
  }
  .voice-row.collapsed .event{
    height:28px;
  }
  .voice-row.collapsed .event-inner{
    gap:0;
    padding:0 6px;
  }
  .voice-row.collapsed .event span,
  .voice-row.collapsed .cycle-line span{
    display:none;
  }
  .event.change{
    border-color:#c9d9c8;
    background:var(--green-soft);
  }
  .event-inner{
    display:flex;
    height:100%;
    flex-direction:column;
    justify-content:center;
    gap:2px;
    padding:0 7px;
    white-space:nowrap;
  }
  .event strong{
    display:block;
    font-size:12px;
    line-height:1;
  }
  .event span{
    display:block;
    color:var(--muted);
    font-size:10px;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .change-pin{
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:4px;
    background:var(--green);
  }
  .empty{
    min-height:240px;
    display:grid;
    place-items:center;
    color:var(--muted);
    border-bottom:1px solid var(--line);
  }
  @media (max-width:760px){
    :root{--editor-w:330px;--beat-px:38px}
    .topbar{align-items:flex-start;flex-direction:column}
    .toolbar{margin-left:0;width:100%}
    .metric{min-width:112px}
    .board{height:calc(100vh - 142px)}
    .voice-head{grid-template-columns:32px minmax(0,1fr) 76px 32px}
    .voice-stats{grid-template-columns:1fr}
    .block-editor{grid-template-columns:1fr 1fr 1fr 32px}
  }
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <h1>Texture Timeline</h1>
    <p>Row equations over a beat grid</p>
  </div>
  <div class="toolbar">
    <div class="sig" aria-label="Time signature">
      <label>Beats
        <input id="timeTop" type="number" min="1" max="24" step="1" value="4">
      </label>
      <div class="slash">/</div>
      <label>Unit
        <select id="timeBottom">
          <option value="4" selected>4</option>
          <option value="8">8</option>
          <option value="16">16</option>
          <option value="2">2</option>
        </select>
      </label>
    </div>
    <label class="bar-count">Bars
      <input id="barCount" type="number" min="1" max="512" step="1" value="4">
    </label>
    <div class="metric">
      <span>Piece</span>
      <b id="pieceLength">0 beats</b>
    </div>
    <button id="addRowTop" class="primary" type="button">+ Voice</button>
  </div>
</header>

<main class="board" id="board">
  <div class="timeline-content" id="timelineContent">
    <div class="ruler-row">
      <div class="corner">
        <span>Equations</span>
        <button id="addRowCorner" class="icon" type="button" aria-label="Add voice">+</button>
      </div>
      <div class="ruler" id="ruler"></div>
    </div>
    <div id="rows"></div>
  </div>
</main>

<script>
const RHYTHMS = [
  { token:"s", quarterBeats:0.25 },
  { token:"e", quarterBeats:0.5 },
  { token:"e.", quarterBeats:0.75 },
  { token:"q", quarterBeats:1 },
  { token:"q.", quarterBeats:1.5 },
  { token:"h", quarterBeats:2 },
  { token:"h.", quarterBeats:3 }
];

const rhythmByToken = new Map(RHYTHMS.map((rhythm) => [rhythm.token, rhythm]));
const state = {
  timeTop:4,
  timeBottom:4,
  barCount:4,
  rows:[
    {
      id:createId(),
      name:"Voice 1",
      cycles:4,
      collapsed:false,
      blocks:[
        { id:createId(), rhythm:"e", pitchMode:"change", pitch:"C4" },
        { id:createId(), rhythm:"e", pitchMode:"hold", pitch:"" },
        { id:createId(), rhythm:"q", pitchMode:"change", pitch:"D4" },
        { id:createId(), rhythm:"q.", pitchMode:"hold", pitch:"" }
      ]
    }
  ]
};

const rowsEl = document.getElementById("rows");
const rulerEl = document.getElementById("ruler");
const timelineContentEl = document.getElementById("timelineContent");
const pieceLengthEl = document.getElementById("pieceLength");
const timeTopEl = document.getElementById("timeTop");
const timeBottomEl = document.getElementById("timeBottom");
const barCountEl = document.getElementById("barCount");

function createId(){
  return Math.random().toString(36).slice(2,10);
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function beatUnitQuarterValue(){
  return 4 / state.timeBottom;
}

function rhythmBeats(token){
  const rhythm = rhythmByToken.get(token) || rhythmByToken.get("q");
  return rhythm.quarterBeats / beatUnitQuarterValue();
}

function formatBeats(value){
  if (!Number.isFinite(value)) return "0";
  const rounded = Math.round(value * 100) / 100;
  return Number.isInteger(rounded) ? String(rounded) : rounded.toFixed(2).replace(/0+$/,"").replace(/\.$/,"");
}

function patternBeats(row){
  return row.blocks.reduce((total, block) => total + rhythmBeats(block.rhythm), 0);
}

function totalBeats(row){
  return patternBeats(row) * Math.max(0, Number(row.cycles) || 0);
}

function pieceBeats(){
  return state.timeTop * state.barCount;
}

function rhythmOptions(selected){
  return RHYTHMS.map((rhythm) => {
    const isSelected = rhythm.token === selected ? " selected" : "";
    return `<option value="${rhythm.token}"${isSelected}>${rhythm.token}</option>`;
  }).join("");
}

function pitchModeOptions(selected){
  return ["change","hold"].map((mode) => {
    const isSelected = mode === selected ? " selected" : "";
    const label = mode === "change" ? "Change" : "Hold";
    return `<option value="${mode}"${isSelected}>${label}</option>`;
  }).join("");
}

function render(){
  const beatPx = getBeatPx();
  const measurePx = state.timeTop * beatPx;
  const timelineWidth = Math.ceil(pieceBeats() * beatPx);
  timelineContentEl.style.setProperty("--beat-px", `${beatPx}px`);
  timelineContentEl.style.setProperty("--measure-px", `${measurePx}px`);
  timelineContentEl.style.setProperty("--timeline-w", `${timelineWidth}px`);
  pieceLengthEl.textContent = `${state.barCount} bars / ${formatBeats(pieceBeats())} beats`;
  renderRuler(timelineWidth, beatPx);
  renderRows(beatPx);
}

function getBeatPx(){
  return window.matchMedia("(max-width: 760px)").matches ? 38 : 44;
}

function renderRuler(timelineWidth, beatPx){
  const measureBeats = state.timeTop;
  const total = pieceBeats();
  const labels = [];
  for (let measure = 0; measure < state.barCount; measure += 1){
    const left = measure * measureBeats * beatPx;
    labels.push(`<span class="measure-label" style="left:${left}px">m${measure + 1}</span>`);
  }
  for (let beat = 0; beat <= Math.ceil(total); beat += 1){
    const left = beat * beatPx;
    labels.push(`<span class="beat-label" style="left:${left}px">${beat}</span>`);
  }
  rulerEl.style.width = `${timelineWidth}px`;
  rulerEl.innerHTML = labels.join("");
}

function renderRows(beatPx){
  if (state.rows.length === 0){
    rowsEl.innerHTML = `<div class="empty">No voices</div>`;
    return;
  }
  rowsEl.innerHTML = state.rows.map((row) => renderRow(row, beatPx)).join("");
}

function renderRow(row, beatPx){
  const pattern = patternBeats(row);
  const total = totalBeats(row);
  const cycles = Math.max(0, Number(row.cycles) || 0);
  const events = renderEvents(row, beatPx);
  const cycleLines = renderCycleLines(pattern, cycles, beatPx);
  if (row.collapsed){
    return `
      <section class="voice-row collapsed" data-row-id="${row.id}">
        <div class="voice-editor">
          <div class="voice-collapsed">
            <button class="icon" type="button" data-action="toggle-collapse" aria-label="Expand ${escapeHtml(row.name)}">+</button>
            <div class="voice-summary">
              <strong>${escapeHtml(row.name)}</strong>
              <span>${cycles} cycles &middot; ${formatBeats(pattern)} beat pattern &middot; ${formatBeats(total)} beats total</span>
              <div class="compact-sequence">${renderCompactSequence(row)}</div>
            </div>
            <button class="icon danger" type="button" data-action="delete-row" aria-label="Delete ${escapeHtml(row.name)}">x</button>
          </div>
        </div>
        <div class="lane-cell">
          <div class="lane-axis">${cycleLines}</div>
          ${events}
        </div>
      </section>
    `;
  }
  const blocks = row.blocks.map((block, index) => renderBlockEditor(row, block, index)).join("");
  return `
    <section class="voice-row" data-row-id="${row.id}">
      <div class="voice-editor">
        <div class="voice-head">
          <button class="icon" type="button" data-action="toggle-collapse" aria-label="Collapse ${escapeHtml(row.name)}">-</button>
          <label>Name
            <input data-field="name" value="${escapeHtml(row.name)}" autocomplete="off">
          </label>
          <label>Cycles
            <input data-field="cycles" type="number" min="0" max="128" step="1" value="${escapeHtml(row.cycles)}">
          </label>
          <button class="icon danger" type="button" data-action="delete-row" aria-label="Delete ${escapeHtml(row.name)}">x</button>
        </div>
        <div class="voice-stats">
          <div class="stat"><span>Pattern</span><b>${formatBeats(pattern)} beats</b></div>
          <div class="stat"><span>Total</span><b>${formatBeats(total)} beats</b></div>
          <div class="stat"><span>Blocks</span><b>${row.blocks.length}</b></div>
        </div>
        <div class="block-list">
          ${blocks}
        </div>
        <div class="row-actions">
          <button type="button" data-action="add-block">+ Block</button>
        </div>
      </div>
      <div class="lane-cell">
        <div class="lane-axis">${cycleLines}</div>
        ${events}
      </div>
    </section>
  `;
}

function renderCompactSequence(row){
  if (row.blocks.length === 0) return `<span class="rhythm-chip">empty</span>`;
  return row.blocks.map((block) => {
    const pitch = block.pitchMode === "change" && block.pitch.trim() ? `:${block.pitch.trim()}` : "";
    return `<span class="rhythm-chip">${escapeHtml(block.rhythm + pitch)}</span>`;
  }).join("");
}

function renderBlockEditor(row, block, index){
  const pitchDisabled = block.pitchMode === "hold" ? " disabled" : "";
  const pitchValue = block.pitchMode === "hold" ? "" : block.pitch;
  const pitchPlaceholder = block.pitchMode === "hold" ? "held" : "C4";
  return `
    <div class="block-editor" data-block-id="${block.id}">
      <label>Rhythm
        <select data-field="rhythm">${rhythmOptions(block.rhythm)}</select>
      </label>
      <label>Pitch
        <select data-field="pitchMode">${pitchModeOptions(block.pitchMode)}</select>
      </label>
      <label>Value
        <input class="pitch-input" data-field="pitch" value="${escapeHtml(pitchValue)}" placeholder="${pitchPlaceholder}"${pitchDisabled} autocomplete="off">
      </label>
      <button class="icon danger" type="button" data-action="delete-block" aria-label="Delete block ${index + 1}">x</button>
    </div>
  `;
}

function renderCycleLines(pattern, cycles, beatPx){
  if (pattern <= 0 || cycles <= 1) return "";
  const lines = [];
  for (let cycle = 1; cycle < cycles; cycle += 1){
    const left = pattern * cycle * beatPx;
    lines.push(`<div class="cycle-line" style="left:${left}px"><span>c${cycle + 1}</span></div>`);
  }
  return lines.join("");
}

function renderEvents(row, beatPx){
  let start = 0;
  let currentPitch = "";
  const events = [];
  const cycles = Math.max(0, Number(row.cycles) || 0);
  for (let cycle = 0; cycle < cycles; cycle += 1){
    for (const block of row.blocks){
      const duration = rhythmBeats(block.rhythm);
      if (block.pitchMode === "change" && block.pitch.trim()){
        currentPitch = block.pitch.trim();
      }
      const left = start * beatPx;
      const width = Math.max(duration * beatPx, 14);
      const pitchLabel = currentPitch || "--";
      const changeClass = block.pitchMode === "change" ? " change" : "";
      const pin = block.pitchMode === "change" ? `<i class="change-pin"></i>` : "";
      events.push(`
        <div class="event${changeClass}" style="left:${left}px;width:${width}px">
          ${pin}
          <div class="event-inner">
            <strong>${escapeHtml(block.rhythm)}</strong>
            <span>${escapeHtml(pitchLabel)}</span>
          </div>
        </div>
      `);
      start += duration;
    }
  }
  return events.join("");
}

function findRow(id){
  return state.rows.find((row) => row.id === id);
}

function findBlock(row, id){
  return row.blocks.find((block) => block.id === id);
}

function addRow(){
  const index = state.rows.length + 1;
  state.rows.push({
    id:createId(),
    name:`Voice ${index}`,
    cycles:4,
    collapsed:false,
    blocks:[
      { id:createId(), rhythm:"q", pitchMode:"change", pitch:"C4" },
      { id:createId(), rhythm:"e", pitchMode:"hold", pitch:"" },
      { id:createId(), rhythm:"e", pitchMode:"change", pitch:"D4" }
    ]
  });
  render();
}

function addBlock(row){
  row.blocks.push({ id:createId(), rhythm:"q", pitchMode:"hold", pitch:"" });
}

function handleRowChange(event){
  const target = event.target;
  const rowEl = target.closest(".voice-row");
  if (!rowEl) return;
  const row = findRow(rowEl.dataset.rowId);
  if (!row) return;
  const blockEl = target.closest(".block-editor");
  if (blockEl){
    const block = findBlock(row, blockEl.dataset.blockId);
    if (!block) return;
    if (target.dataset.field === "rhythm"){
      block.rhythm = target.value;
      render();
    }
    if (target.dataset.field === "pitchMode"){
      block.pitchMode = target.value;
      render();
    }
    if (target.dataset.field === "pitch"){
      block.pitch = target.value.trim();
      render();
    }
    return;
  }
  if (target.dataset.field === "name"){
    row.name = target.value.trim() || "Voice";
    render();
  }
  if (target.dataset.field === "cycles"){
    row.cycles = Math.max(0, Math.floor(Number(target.value) || 0));
    render();
  }
}

function handleRowClick(event){
  const actionTarget = event.target.closest("[data-action]");
  if (!actionTarget) return;
  const rowEl = actionTarget.closest(".voice-row");
  const row = rowEl ? findRow(rowEl.dataset.rowId) : null;
  if (actionTarget.dataset.action === "delete-row" && row){
    state.rows = state.rows.filter((candidate) => candidate.id !== row.id);
    render();
  }
  if (actionTarget.dataset.action === "toggle-collapse" && row){
    row.collapsed = !row.collapsed;
    render();
  }
  if (actionTarget.dataset.action === "add-block" && row){
    addBlock(row);
    render();
  }
  if (actionTarget.dataset.action === "delete-block" && row){
    const blockEl = actionTarget.closest(".block-editor");
    row.blocks = row.blocks.filter((block) => block.id !== blockEl.dataset.blockId);
    render();
  }
}

function updatePieceSettings(){
  state.timeTop = Math.max(1, Math.floor(Number(timeTopEl.value) || 1));
  state.timeBottom = Math.max(1, Math.floor(Number(timeBottomEl.value) || 4));
  state.barCount = Math.max(1, Math.floor(Number(barCountEl.value) || 1));
  timeTopEl.value = state.timeTop;
  barCountEl.value = state.barCount;
  render();
}

rowsEl.addEventListener("change", handleRowChange);
rowsEl.addEventListener("click", handleRowClick);
document.getElementById("addRowTop").addEventListener("click", addRow);
document.getElementById("addRowCorner").addEventListener("click", addRow);
timeTopEl.addEventListener("change", updatePieceSettings);
timeBottomEl.addEventListener("change", updatePieceSettings);
barCountEl.addEventListener("change", updatePieceSettings);
window.addEventListener("resize", render);

render();
</script>
</body>
</html>
